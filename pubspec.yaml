name: gps_drivers
description: GPS Driver Management System - Flutter Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  cloud_firestore: ^5.1.0

  # Map
  flutter_map: ^6.2.1
  latlong2: ^0.9.0

  # Networking
  http: ^1.2.1

  # Location
  geolocator: ^12.0.0

  # Utils
  uuid: ^4.4.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
